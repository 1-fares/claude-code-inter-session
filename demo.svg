<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 900 410"
     width="900" height="410"
     role="img"
     aria-label="Two Claude Code sessions coordinating a schema change via inter-session">
  <title>inter-session demo: backend asks web to surface a new field, two rounds, then both disconnect</title>
  <desc>The backend session connects as `backend`; the web session connects as `web`. Backend sends a request with /is s web; web edits the UI, rebuilds, and replies with /is s backend. After a second round both sides disconnect with /is d.</desc>

  <style>
    .bg     { fill: #0d1117; }
    .pane   { fill: #161b22; stroke: #30363d; stroke-width: 1; }

    text {
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, "Courier New", monospace;
    }

    .topTitle  { font-size: 13px; font-weight: 500; fill: #8b949e; letter-spacing: 0.2px; }
    .path      { font-size: 12px; font-weight: 500; fill: #8b949e; }
    .branch    { font-size: 12px; font-weight: 500; fill: #7ee787; }
    .role      { font-size: 12px; font-weight: 600; fill: #c9d1d9; }

    .line      { font-size: 14px; fill: #c9d1d9; }
    .incoming  { fill: #d2a8ff; }

    .dot    { fill: #7ee787; }
    .str    { fill: #a5d6ff; }
    .cmd    { fill: #ffa657; font-weight: 600; }
    .arrow  { fill: #8b949e; }
    .pass   { fill: #7ee787; }
    .prompt { fill: #ffa657; font-weight: 600; }

    /* Cycle = 16s. 18 events fade in one after another (4% apart, 2% fade),
       hold to 88%, then fade out together by 94%. */
    @keyframes f01 { 0%      {opacity:0} 2%,88%  {opacity:1} 94%,100% {opacity:0} }
    @keyframes f02 { 0%,4%   {opacity:0} 6%,88%  {opacity:1} 94%,100% {opacity:0} }
    @keyframes f03 { 0%,8%   {opacity:0} 10%,88% {opacity:1} 94%,100% {opacity:0} }
    @keyframes f04 { 0%,12%  {opacity:0} 14%,88% {opacity:1} 94%,100% {opacity:0} }
    @keyframes f05 { 0%,16%  {opacity:0} 18%,88% {opacity:1} 94%,100% {opacity:0} }
    @keyframes f06 { 0%,20%  {opacity:0} 22%,88% {opacity:1} 94%,100% {opacity:0} }
    @keyframes f07 { 0%,24%  {opacity:0} 26%,88% {opacity:1} 94%,100% {opacity:0} }
    @keyframes f08 { 0%,28%  {opacity:0} 30%,88% {opacity:1} 94%,100% {opacity:0} }
    @keyframes f09 { 0%,32%  {opacity:0} 34%,88% {opacity:1} 94%,100% {opacity:0} }
    @keyframes f10 { 0%,36%  {opacity:0} 38%,88% {opacity:1} 94%,100% {opacity:0} }
    @keyframes f11 { 0%,40%  {opacity:0} 42%,88% {opacity:1} 94%,100% {opacity:0} }
    @keyframes f12 { 0%,44%  {opacity:0} 46%,88% {opacity:1} 94%,100% {opacity:0} }
    @keyframes f13 { 0%,48%  {opacity:0} 50%,88% {opacity:1} 94%,100% {opacity:0} }
    @keyframes f14 { 0%,52%  {opacity:0} 54%,88% {opacity:1} 94%,100% {opacity:0} }
    @keyframes f15 { 0%,56%  {opacity:0} 58%,88% {opacity:1} 94%,100% {opacity:0} }
    @keyframes f16 { 0%,60%  {opacity:0} 62%,88% {opacity:1} 94%,100% {opacity:0} }
    @keyframes f17 { 0%,64%  {opacity:0} 66%,88% {opacity:1} 94%,100% {opacity:0} }
    @keyframes f18 { 0%,68%  {opacity:0} 70%,88% {opacity:1} 94%,100% {opacity:0} }

    /* Chronological step order:
       L0 L1 R0 R1 L2 L3 R2 R3 R4 L4 L5 L6 R5 R6 R7 L7 L8 R8 */
    .L0 { animation: f01 16s linear infinite both; }
    .L1 { animation: f02 16s linear infinite both; }
    .R0 { animation: f03 16s linear infinite both; }
    .R1 { animation: f04 16s linear infinite both; }
    .L2 { animation: f05 16s linear infinite both; }
    .L3 { animation: f06 16s linear infinite both; }
    .R2 { animation: f07 16s linear infinite both; }
    .R3 { animation: f08 16s linear infinite both; }
    .R4 { animation: f09 16s linear infinite both; }
    .L4 { animation: f10 16s linear infinite both; }
    .L5 { animation: f11 16s linear infinite both; }
    .L6 { animation: f12 16s linear infinite both; }
    .R5 { animation: f13 16s linear infinite both; }
    .R6 { animation: f14 16s linear infinite both; }
    .R7 { animation: f15 16s linear infinite both; }
    .L7 { animation: f16 16s linear infinite both; }
    .L8 { animation: f17 16s linear infinite both; }
    .R8 { animation: f18 16s linear infinite both; }
  </style>

  <rect class="bg" width="900" height="410"/>

  <text class="topTitle" x="450" y="28" text-anchor="middle">backend session ⇄ web session — delegating a UI change via inter-session (illustration only)</text>

  <!-- Left pane: backend session -->
  <g transform="translate(20, 50)">
    <rect class="pane" width="420" height="340" rx="6"/>
    <text class="path"   x="16"  y="22">~/proj/api</text>
    <text class="branch" x="210" y="22" text-anchor="middle">git:(main)</text>
    <text class="role"   x="404" y="22" text-anchor="end">backend</text>
    <line stroke="#30363d" stroke-width="1" x1="16" y1="32" x2="404" y2="32"/>

    <g transform="translate(16, 54)">
      <text class="line L0" y="0"><tspan class="prompt">&gt;</tspan> <tspan class="cmd">/is c backend</tspan></text>
      <text class="line L1" y="26"><tspan class="arrow">→</tspan> connected <tspan class="pass">✓</tspan></text>
      <text class="line L2" y="60"><tspan class="prompt">&gt;</tspan> ask web to add created_at to the table</text>
      <text class="line L3" y="90"><tspan class="dot">●</tspan> <tspan class="cmd">/is s web</tspan> <tspan class="str">"/users now returns created_at"</tspan></text>
      <text class="line incoming L4" y="120">[from web] done: column added, build <tspan class="pass">✓</tspan></text>
      <text class="line L5" y="154"><tspan class="prompt">&gt;</tspan> also sort by it, newest first</text>
      <text class="line L6" y="184"><tspan class="dot">●</tspan> <tspan class="cmd">/is s web</tspan> <tspan class="str">"sort the table by it, desc"</tspan></text>
      <text class="line incoming L7" y="214">[from web] done: sorted desc, tsc <tspan class="pass">✓</tspan></text>
      <text class="line L8" y="248"><tspan class="prompt">&gt;</tspan> <tspan class="cmd">/is d</tspan>   <tspan class="arrow">→</tspan> disconnected</text>
    </g>
  </g>

  <!-- Right pane: web session -->
  <g transform="translate(460, 50)">
    <rect class="pane" width="420" height="340" rx="6"/>
    <text class="path"   x="16"  y="22">~/proj/web</text>
    <text class="branch" x="210" y="22" text-anchor="middle">git:(main)</text>
    <text class="role"   x="404" y="22" text-anchor="end">web</text>
    <line stroke="#30363d" stroke-width="1" x1="16" y1="32" x2="404" y2="32"/>

    <g transform="translate(16, 54)">
      <text class="line R0" y="0"><tspan class="prompt">&gt;</tspan> <tspan class="cmd">/is c web</tspan></text>
      <text class="line R1" y="26"><tspan class="arrow">→</tspan> connected <tspan class="pass">✓</tspan></text>
      <text class="line incoming R2" y="60">[from backend] /users now returns created_at</text>
      <text class="line R3" y="90"><tspan class="dot">●</tspan> Edit UserTable.tsx · npm run build <tspan class="arrow">→</tspan> <tspan class="pass">✓</tspan></text>
      <text class="line R4" y="120"><tspan class="dot">●</tspan> <tspan class="cmd">/is s backend</tspan> <tspan class="str">"done: column added, build ✓"</tspan></text>
      <text class="line incoming R5" y="154">[from backend] sort the table by it, desc</text>
      <text class="line R6" y="184"><tspan class="dot">●</tspan> Edit UserTable.tsx · sort desc <tspan class="arrow">→</tspan> <tspan class="pass">✓</tspan></text>
      <text class="line R7" y="214"><tspan class="dot">●</tspan> <tspan class="cmd">/is s backend</tspan> <tspan class="str">"done: sorted desc, tsc ✓"</tspan></text>
      <text class="line R8" y="248"><tspan class="prompt">&gt;</tspan> <tspan class="cmd">/is d</tspan>   <tspan class="arrow">→</tspan> disconnected</text>
    </g>
  </g>
</svg>
